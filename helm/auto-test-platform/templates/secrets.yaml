apiVersion: v1
kind: Secret
metadata:
  name: platform-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "auto-test.labels" . | nindent 4 }}
type: Opaque
stringData:
  django-secret-key: {{ .Values.secrets.djangoSecretKey | quote }}
  rabbitmq-password: {{ .Values.secrets.rabbitmqPassword | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: ai-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "auto-test.labels" . | nindent 4 }}
type: Opaque
stringData:
  openai-api-key: {{ .Values.secrets.openaiApiKey | default "" | quote }}
  qwen-api-key: {{ .Values.secrets.qwenApiKey | default "" | quote }}
