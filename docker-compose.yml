version: '3.8'

services:
  # Redis 缓存和Channel层
  redis:
    image: redis:7-alpine
    container_name: auto-test-redis
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - auto-test-network

  # RabbitMQ 消息队列
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: auto-test-rabbitmq
    ports:
      - "0.0.0.0:5672:5672"
      - "127.0.0.1:15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: -rabbit loopback_users [] -rabbit heartbeat 60 -rabbit tcp_listeners [{"0.0.0.0",5672}]
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - auto-test-network

  # Django 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auto-test-backend
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-*}
      DEBUG: ${DEBUG:-False}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:80,https://localhost,https://43.136.56.242}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_PUBLIC_HOST: ${RABBITMQ_PUBLIC_HOST:-43.136.56.242}
      RABBITMQ_VHOST: /
      RABBITMQ_ENCRYPTION_KEY: ${RABBITMQ_ENCRYPTION_KEY}
      PORT: 8000
      SECURE_SSL_REDIRECT: "False"
    volumes:
      - backend_static:/app/staticfiles
      - backend_media:/app/media
      - backend_reports:/app/reports
      - backend_db:/app/db
      - backend_sessions:/app/sessions
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - auto-test-network
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.connect((\"localhost\", 8000)); s.close()' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # Playwright 容器化执行器（生产）
  # 支持 scale 水平扩展：docker-compose up --scale executor=3
  # ============================================
  executor:
    build:
      context: ./executor-docker
      dockerfile: Dockerfile
    # 不固定 container_name，允许 scale 多实例
    environment:
      BACKEND_URL: http://backend:8000
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      EXECUTOR_NAME: ${EXECUTOR_NAME:-docker-executor}
      OWNER_USERNAME: ${OWNER_USERNAME:-}
      MAX_CONCURRENT: ${EXECUTOR_MAX_CONCURRENT:-2}
      HEARTBEAT_INTERVAL: ${HEARTBEAT_INTERVAL:-30}
      PLAYWRIGHT_HEADLESS: "true"
      TRACE_ENABLED: ${TRACE_ENABLED:-true}
    volumes:
      - executor_traces:/app/traces
      - executor_logs:/app/logs
    depends_on:
      backend:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    deploy:
      replicas: ${EXECUTOR_REPLICAS:-2}
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 1G
    restart: unless-stopped
    networks:
      - auto-test-network

  # ============================================
  # Playwright 调试执行器（noVNC 可视化）
  # 访问 http://localhost:6080 观察浏览器操作
  # ============================================
  executor-debug:
    build:
      context: ./executor-docker
      dockerfile: Dockerfile.debug
    container_name: auto-test-executor-debug
    ports:
      - "127.0.0.1:6080:6080"
    environment:
      BACKEND_URL: http://backend:8000
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      EXECUTOR_NAME: ${EXECUTOR_DEBUG_NAME:-debug-executor}
      OWNER_USERNAME: ${OWNER_USERNAME:-}
      MAX_CONCURRENT: 1
      HEARTBEAT_INTERVAL: ${HEARTBEAT_INTERVAL:-30}
      PLAYWRIGHT_HEADLESS: "false"
      TRACE_ENABLED: "true"
    volumes:
      - executor_traces:/app/traces
    depends_on:
      backend:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    profiles:
      - debug
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
    restart: unless-stopped
    networks:
      - auto-test-network

  # Vue 前端 (HTTPS自动构建)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NGINX_CONFIG: nginx-https.conf.template
    container_name: auto-test-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ssl/cert.crt:/etc/nginx/ssl/cert.crt:ro
      - ./ssl/cert.key:/etc/nginx/ssl/cert.key:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - auto-test-network

volumes:
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  backend_static:
    driver: local
  backend_media:
    driver: local
  backend_reports:
    driver: local
  backend_db:
    driver: local
  backend_sessions:
    driver: local
  executor_traces:
    driver: local
  executor_logs:
    driver: local

networks:
  auto-test-network:
    driver: bridge
