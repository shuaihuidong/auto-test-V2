[pytest]
testpaths = tests
base_url = http://localhost:80
# Playwright 配置
# --headed: 有头模式调试
# --browser chromium: 指定浏览器
addopts = --headed --browser chromium -v --tb=short
markers =
    ui: 前端 UI 测试
    api: 后端 API 测试
    ai: AI 功能测试
    executor: 执行器调度测试
    flow: 全链路流程测试
    p0: P0 优先级
    p1: P1 优先级
    p2: P2 优先级
