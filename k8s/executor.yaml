# ============================================
# 执行器 Deployment + HPA 自动伸缩
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: executor
  namespace: auto-test
  labels:
    app: executor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: executor
  template:
    metadata:
      labels:
        app: executor
    spec:
      containers:
        - name: executor
          image: auto-test-executor:latest
          env:
            - name: BACKEND_URL
              value: "http://backend:8000"
            - name: RABBITMQ_HOST
              value: "rabbitmq"
            - name: RABBITMQ_USER
              value: "guest"
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: rabbitmq-password
            - name: PLAYWRIGHT_HEADLESS
              value: "true"
            - name: TRACE_ENABLED
              value: "true"
            - name: MAX_CONCURRENT
              value: "2"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: traces
              mountPath: /app/traces
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: traces
          emptyDir: {}
        - name: logs
          emptyDir: {}
---
# HPA: 根据 CPU 使用率自动伸缩执行器
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: executor-hpa
  namespace: auto-test
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: executor
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
